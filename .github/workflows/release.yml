name: Release Chrome Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ZIP_NAME: chase-status-viewer.zip
      EXPECTED_CHROME_EXTENSION_ID: lljgnhhealbjbnenmmidncipmgbahggh
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Print release diagnostics
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          git --version
          echo "Target Chrome Web Store item: ${EXPECTED_CHROME_EXTENSION_ID}"
          echo "Ref name: ${GITHUB_REF_NAME}"
          echo "Release artifact: ${ZIP_NAME}"

      - name: Validate release configuration
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in CHROME_EXTENSION_ID CHROME_CLIENT_ID CHROME_CLIENT_SECRET CHROME_REFRESH_TOKEN; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          if [ "$CHROME_EXTENSION_ID" != "$EXPECTED_CHROME_EXTENSION_ID" ]; then
            echo "CHROME_EXTENSION_ID secret does not match the expected public listing ID ($EXPECTED_CHROME_EXTENSION_ID)." >&2
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z. Received: $tag" >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./public/manifest.json').version")"
          tag_version="${tag#v}"

          if [ "$package_version" != "$manifest_version" ]; then
            echo "package.json version ($package_version) does not match public/manifest.json version ($manifest_version)." >&2
            exit 1
          fi

          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version ($tag_version) does not match package.json/public/manifest.json version ($package_version)." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Verify packaged release artifact
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$ZIP_NAME" ]; then
            echo "Missing release artifact: $ZIP_NAME" >&2
            exit 1
          fi
          artifact_manifest_version="$(unzip -p "$ZIP_NAME" manifest.json | node -e "const fs = require('fs'); const manifest = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(manifest.version);")"
          if [ "$artifact_manifest_version" != "${{ steps.validate.outputs.version }}" ]; then
            echo "Packaged manifest version ($artifact_manifest_version) does not match release version (${{ steps.validate.outputs.version }})." >&2
            exit 1
          fi

      - name: Create GitHub release
        id: github_release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

      - name: Upload to Chrome Web Store
        id: chrome_upload
        shell: bash
        run: |
          set -euo pipefail
          npx chrome-webstore-upload-cli@3 upload \
            --source "$ZIP_NAME" \
            --extension-id "$CHROME_EXTENSION_ID" \
            --client-id "$CHROME_CLIENT_ID" \
            --client-secret "$CHROME_CLIENT_SECRET" \
            --refresh-token "$CHROME_REFRESH_TOKEN"

      - name: Publish to Chrome Web Store
        id: chrome_publish
        shell: bash
        run: |
          set -euo pipefail
          npx chrome-webstore-upload-cli@3 publish \
            --extension-id "$CHROME_EXTENSION_ID" \
            --client-id "$CHROME_CLIENT_ID" \
            --client-secret "$CHROME_CLIENT_SECRET" \
            --refresh-token "$CHROME_REFRESH_TOKEN"

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- Release tag: ${{ steps.validate.outputs.tag || github.ref_name }}"
            echo "- Zip artifact: ${ZIP_NAME}"
            echo "- GitHub Release: ${{ steps.github_release.outcome }}"
            echo "- Chrome Web Store upload: ${{ steps.chrome_upload.outcome }}"
            echo "- Chrome Web Store publish: ${{ steps.chrome_publish.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
